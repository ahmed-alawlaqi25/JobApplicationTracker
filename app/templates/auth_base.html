<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>{%block title%} JobTracker {%endblock%}</title>
</head>
<body>
<!-- ========================= auth-section start ========================= -->
<section id="auth-section">
    <div class="auth-container">
        <div class="auth-card-1">
            <object data="{{ url_for('static', filename='img/jobtracker_logo_transparent2.svg') }}"
                    type="image/svg+xml"
                    class="logo-color"></object>
            {% block form_content %}
            {% endblock %}
        </div>
        <div class="auth-card-2">
            <img src="{{ url_for('static', filename='img/jobtracker_logo_transparent.svg') }}" alt="logo">
            <h4>Application Tracker</h4>
            <h4>Application Tracker</h4>
        </div>
    </div>
</section>
</body>
</html>
