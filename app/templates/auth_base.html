<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>{%block title%} JobTracker {%endblock%}</title>
</head>
<body>
<!-- ========================= auth-section start ========================= -->
<section id="auth-section">
    <div class="auth-container">
        <div class="auth-card-1">
            <object data="{{ url_for('static', filename='img/jobtracker_logo_transparent2.svg') }}"
                    type="image/svg+xml"
                    class="logo-color"></object>
            {% block form_content %}
            {% endblock %}
        </div>
        <div class="auth-card-2">
            <div class="auth-logo">
                <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="logo">
            </div>
            <p class="auth-brand-name">متتبع الوظائف</p>
            <div class="auth-features">
                <div class="auth-feat">
                    <i class="ti ti-briefcase"></i>
                    <span>تتبع طلباتك في مكان واحد</span>
                </div>
                <div class="auth-feat">
                    <i class="ti ti-clock"></i>
                    <span>وفّر وقتك وابقَ منظماً</span>
                </div>
                <div class="auth-feat">
                    <i class="ti ti-file-text"></i>
                    <span>سيرة ذاتية لكل وظيفة</span>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
